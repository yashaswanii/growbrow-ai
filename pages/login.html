<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — GrowBrow.ai</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:40px 24px; }
    body::before { content:''; position:fixed; inset:0; background: radial-gradient(ellipse at 30% 50%, rgba(34,197,94,0.06) 0%, transparent 60%), radial-gradient(ellipse at 70% 50%, rgba(56,189,248,0.06) 0%, transparent 60%); pointer-events:none; }
    .login-wrap { width:100%; max-width:420px; position:relative; }
    .login-logo { text-align:center; margin-bottom:32px; }
    .login-box { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:40px; }
    .login-box h1 { font-family:var(--font-head); font-size:1.6rem; font-weight:800; margin-bottom:6px; }
    .login-box p { color:var(--text-muted); font-size:0.88rem; margin-bottom:28px; }
    .form-group { margin-bottom:18px; }
    label { display:block; font-size:0.78rem; font-weight:700; margin-bottom:6px; color:var(--text-muted); font-family:var(--font-head); letter-spacing:0.08em; text-transform:uppercase; }
    input[type=email], input[type=password] { width:100%; background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:12px 16px; color:var(--text); font-family:var(--font-body); font-size:0.9rem; transition:border-color 0.2s, box-shadow 0.2s; outline:none; }
    input:focus { border-color:var(--green); box-shadow:0 0 0 3px rgba(34,197,94,0.1); }
    .forgot { float:right; font-size:0.78rem; color:var(--green); text-decoration:none; }
    .btn-submit { width:100%; padding:14px; background:var(--gradient); color:#050a10; font-family:var(--font-head); font-weight:700; font-size:1rem; border:none; border-radius:50px; cursor:pointer; transition:opacity 0.2s; margin-top:8px; }
    .btn-submit:hover { opacity:0.9; }
    .divider { display:flex; align-items:center; gap:12px; margin:20px 0; color:var(--text-muted); font-size:0.78rem; }
    .divider::before,.divider::after { content:''; flex:1; height:1px; background:var(--border); }
    .btn-google { width:100%; padding:12px; background:var(--bg2); border:1px solid var(--border); border-radius:50px; color:var(--text); font-family:var(--font-head); font-weight:600; font-size:0.88rem; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; transition:border-color 0.2s; }
    .btn-google:hover { border-color:rgba(255,255,255,0.25); }
    .auth-switch { text-align:center; margin-top:20px; font-size:0.85rem; color:var(--text-muted); }
    .auth-switch a { color:var(--green); text-decoration:none; font-weight:600; }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-logo">
    <a href="../index.html" class="logo" style="justify-content:center;">
      <span class="logo-mark">G</span><span class="logo-text">GrowBrow<span class="logo-ai">.ai</span></span>
    </a>
  </div>
  <div class="login-box">
    <h1>Welcome back 👋</h1>
    <p>Sign in to your GrowBrow.ai dashboard</p>

    <button class="btn-google">
      <svg width="18" height="18" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
      Continue with Google
    </button>

    <div class="divider">or</div>

    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email <a href="#" class="forgot">Forgot password?</a></label>
        <input type="email" placeholder="you@company.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn-submit">Sign In →</button>
    </form>
    <p class="auth-switch">Don't have an account? <a href="signup.html">Sign up free</a></p>
  </div>
</div>
<script>
function handleLogin(e){
  e.preventDefault();
  const btn = e.target.querySelector('.btn-submit');
  btn.textContent = '✓ Signing in...';
  setTimeout(() => { window.location.href = 'dashboard.html'; }, 1200);
}
</script>
</body>
</html>
